<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Frog Evolution</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Russo+One&family=Nunito:wght@600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a2e1a;
        font-family: 'Nunito', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      /* ===== Игровой UI: utility-классы ===== */
      .ff-display {
        font-family: 'Russo One', system-ui, sans-serif;
        letter-spacing: 0.5px;
      }
      .ff-body {
        font-family: 'Nunito', system-ui, sans-serif;
      }

      /* Многослойная "stroke" обводка для крупного текста — как в аркадных играх */
      .ff-stroke-dark {
        text-shadow:
          -2px 0 0 #1f2a14,
          2px 0 0 #1f2a14,
          0 -2px 0 #1f2a14,
          0 2px 0 #1f2a14,
          -2px -2px 0 #1f2a14,
          2px -2px 0 #1f2a14,
          -2px 2px 0 #1f2a14,
          2px 2px 0 #1f2a14,
          0 4px 0 rgba(0, 0, 0, 0.35);
      }
      .ff-stroke-white {
        text-shadow:
          -2px 0 0 #fff,
          2px 0 0 #fff,
          0 -2px 0 #fff,
          0 2px 0 #fff,
          -2px -2px 0 #fff,
          2px -2px 0 #fff,
          -2px 2px 0 #fff,
          2px 2px 0 #fff,
          0 4px 0 rgba(0, 0, 0, 0.35);
      }

      /* "Пухлая" 3D кнопка с эффектом нажатия */
      .ff-btn {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        font-family: 'Russo One', system-ui, sans-serif;
        letter-spacing: 0.3px;
        color: #fff;
        text-shadow: 0 2px 0 rgba(0, 0, 0, 0.35);
        padding: 8px 14px;
        border-radius: 14px;
        border: 3px solid var(--ff-btn-border, #14532d);
        border-bottom-width: 6px;
        background: linear-gradient(
          180deg,
          var(--ff-btn-from, #4ade80) 0%,
          var(--ff-btn-to, #16a34a) 100%
        );
        box-shadow:
          0 2px 0 rgba(0, 0, 0, 0.15),
          inset 0 1px 0 rgba(255, 255, 255, 0.35);
        transition:
          transform 80ms ease,
          border-bottom-width 80ms ease;
        cursor: pointer;
        white-space: nowrap;
      }
      .ff-btn:active:not(:disabled) {
        border-bottom-width: 3px;
        transform: translateY(3px);
      }
      .ff-btn:disabled {
        cursor: not-allowed;
        opacity: 0.85;
        filter: saturate(0.6);
      }

      /* Цветовые скины кнопки */
      .ff-btn-green {
        --ff-btn-from: #4ade80;
        --ff-btn-to: #16a34a;
        --ff-btn-border: #14532d;
      }
      .ff-btn-yellow {
        --ff-btn-from: #fde047;
        --ff-btn-to: #eab308;
        --ff-btn-border: #713f12;
        color: #3a2a05;
        text-shadow: 0 2px 0 rgba(255, 255, 255, 0.45);
      }
      .ff-btn-red {
        --ff-btn-from: #fca5a5;
        --ff-btn-to: #dc2626;
        --ff-btn-border: #7f1d1d;
      }
      .ff-btn-grey {
        --ff-btn-from: #cbd5e1;
        --ff-btn-to: #64748b;
        --ff-btn-border: #334155;
      }
      .ff-btn-purple {
        --ff-btn-from: #c4b5fd;
        --ff-btn-to: #7c3aed;
        --ff-btn-border: #3b0764;
      }
      .ff-btn-amber {
        --ff-btn-from: #fcd34d;
        --ff-btn-to: #d97706;
        --ff-btn-border: #78350f;
        color: #3a2a05;
        text-shadow: 0 2px 0 rgba(255, 255, 255, 0.4);
      }
      .ff-btn-teal {
        --ff-btn-from: #5eead4;
        --ff-btn-to: #0d9488;
        --ff-btn-border: #134e4a;
      }
      .ff-btn-orange {
        --ff-btn-from: #fdba74;
        --ff-btn-to: #ea580c;
        --ff-btn-border: #7c2d12;
      }

      /* Карточка с двойной "деревянной" рамкой */
      .ff-card {
        position: relative;
        background: linear-gradient(180deg, #fefdf3 0%, #f5e9b8 100%);
        border: 3px solid #7c5c2a;
        border-radius: 18px;
        box-shadow:
          0 0 0 2px #fef9d7 inset,
          0 6px 0 #5d4421,
          0 8px 14px rgba(0, 0, 0, 0.25);
      }

      /* Панель магазина — крупная, с "мхом" по краям */
      .ff-panel {
        position: relative;
        background: linear-gradient(180deg, #f5fbe9 0%, #d9eeb6 100%);
        border: 4px solid #4d6b1f;
        border-radius: 28px;
        box-shadow:
          0 0 0 3px #f7ffe0 inset,
          0 8px 0 #2f4413,
          0 12px 30px rgba(0, 0, 0, 0.45);
      }

      /* Хедер/футер игры — деревянная панель */
      .ff-bar {
        background:
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.06) 0%,
            rgba(0, 0, 0, 0.18) 100%
          ),
          linear-gradient(180deg, #2c4117 0%, #1a2810 100%);
        border-bottom: 3px solid #0d1606;
        box-shadow:
          0 4px 0 rgba(0, 0, 0, 0.35),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
      }
      .ff-bar.bottom {
        border-bottom: none;
        border-top: 3px solid #0d1606;
        box-shadow:
          0 -4px 0 rgba(0, 0, 0, 0.35),
          inset 0 -1px 0 rgba(255, 255, 255, 0.1);
      }

      /* Полупрозрачные header/footer когда открыта Звёздная карта (6 этап) */
      body.starmap-mode .ff-bar {
        opacity: 0.55;
        transition: opacity 250ms ease-out;
        /* Сама полоса прозрачна для pointer-events — drag canvas работает в её зоне */
        pointer-events: none;
      }
      /* Но дочерние кнопки/иконки внутри полосы остаются кликабельными */
      body.starmap-mode .ff-bar > *,
      body.starmap-mode .ff-bar button,
      body.starmap-mode .ff-bar .ff-tile {
        pointer-events: auto;
      }
      body.starmap-mode .ff-bar:hover {
        opacity: 0.95;
      }
      .ff-bar {
        transition: opacity 250ms ease-out;
      }

      /* Иконка-плитка для BottomBar (с фронтальной заливкой и нижней тенью) */
      .ff-tile {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 16px;
        border: 3px solid var(--ff-tile-border, #1f2937);
        border-bottom-width: 6px;
        background: linear-gradient(
          180deg,
          var(--ff-tile-from, #f1f5f9) 0%,
          var(--ff-tile-to, #cbd5e1) 100%
        );
        box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.55);
        transition:
          transform 80ms ease,
          border-bottom-width 80ms ease;
      }
      .ff-tile:active {
        border-bottom-width: 3px;
        transform: translateY(3px);
      }

      /* Бейдж уведомления */
      .ff-badge {
        position: absolute;
        top: -6px;
        right: -6px;
        width: 20px;
        height: 20px;
        border-radius: 999px;
        background: linear-gradient(180deg, #f87171 0%, #dc2626 100%);
        border: 2px solid #fff;
        color: #fff;
        font-family: 'Russo One', system-ui, sans-serif;
        font-size: 11px;
        line-height: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 0 rgba(0, 0, 0, 0.3);
      }

      /* Подложка прогресс-полосы */
      .ff-progress-track {
        background: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.4) 0%,
          rgba(0, 0, 0, 0.25) 100%
        );
        border: 1px solid rgba(0, 0, 0, 0.5);
        border-radius: 999px;
        overflow: hidden;
        box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.5);
      }
      .ff-progress-fill {
        height: 100%;
        background: linear-gradient(180deg, #fef08a 0%, #f59e0b 100%);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.5);
        transition: width 100ms linear;
      }
      .ff-progress-fill.waiting {
        background: linear-gradient(180deg, #fca5a5 0%, #dc2626 100%);
      }

      /* Капсула баланса — золотистая, чанковая */
      .ff-balance {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 14px 6px 8px;
        border-radius: 999px;
        background: linear-gradient(180deg, #fde047 0%, #d97706 100%);
        border: 3px solid #78350f;
        border-bottom-width: 5px;
        box-shadow:
          inset 0 2px 0 rgba(255, 255, 255, 0.45),
          0 2px 0 rgba(0, 0, 0, 0.25);
        font-family: 'Russo One', system-ui, sans-serif;
        color: #3a2207;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.45);
      }

      /* Затемнение для оверлеев модалок */
      .ff-backdrop {
        background: radial-gradient(
          ellipse at center,
          rgba(0, 0, 0, 0.35) 0%,
          rgba(0, 0, 0, 0.85) 100%
        );
        backdrop-filter: blur(2px);
      }

      /* Анимации */
      @keyframes ffPop {
        0% {
          transform: scale(0.6);
          opacity: 0;
        }
        60% {
          transform: scale(1.06);
          opacity: 1;
        }
        100% {
          transform: scale(1);
        }
      }
      @keyframes ffFade {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes ffShimmer {
        0%,
        100% {
          transform: translateX(-120%);
        }
        50% {
          transform: translateX(120%);
        }
      }

      .ff-pop {
        animation: ffPop 280ms cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }
      .ff-fade {
        animation: ffFade 220ms ease-out both;
      }

      #app {
        position: relative;
        width: 100%;
        height: 100%;
        /* Safe-area сверху: освобождает место под iOS notch / Android status bar
           когда Telegram открыт в fullscreen. Снизу TG WebView сам корректно
           ограничивает — добавлять не надо. */
        padding-top: env(safe-area-inset-top, 0px);
        box-sizing: border-box;
      }
      #game-canvas {
        position: absolute;
        top: 12%;
        bottom: 13%;
        left: 0;
        right: 0;
        z-index: 0;
        overflow: hidden;
      }
      #ui-root {
        position: absolute;
        inset: 0;
        z-index: 10;
        pointer-events: none;
      }
      #ui-root > div {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="game-canvas"></div>
      <div id="ui-root"></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
